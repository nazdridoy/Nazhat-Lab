# ============================================================
# Nazhat-Lab — Docker Compose
# Runs systemd as PID 1 inside the container so that
# systemctl, hostnamectl, firewall-cmd, journalctl, etc.
# all work exactly as on a real RHEL machine.
#
# Usage:
#   docker compose up -d rhel8          # start RHEL 8
#   docker compose up -d                # start
#   docker compose down                 # stop & remove
# ============================================================

services:

  # ── RHEL 8 (AlmaLinux 8) ─────────────────────────────────
  rhel8:
    image: nazdridoy/nazhat-lab:rhel8
    build:
      context: ./RHEL8
    container_name: nazhat8
    privileged: true
    ports:
      - "2222:22" # ssh student@localhost -p 2222
    restart: unless-stopped
