# Nazhat-Lab — Docker Compose
#
# Usage:
#   docker compose up -d --scale rhel8=3   # start 3 RHEL 8 containers
#   docker compose ps                      # show containers & their SSH ports
#   docker compose down                    # stop & remove all

services:

  # ── RHEL 8 (AlmaLinux 8) ─────────────────────────────────
  rhel8:
    image: nazdridoy/nazhat-lab:rhel8
    build:
      context: ./RHEL8
    privileged: true
    ports:
      - "127.0.0.1::22"   # Docker picks a free host port; use `docker compose ps` to find it
    restart: unless-stopped
