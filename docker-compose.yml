# Nazhat-Lab — Docker Compose
#
# Usage:
#   docker compose up -d               # start 1 container  → ssh -p 2222
#   docker compose up -d --scale rhel8=3  # start 3 containers → ports 2222-2224
#   docker compose ps                  # show containers & assigned SSH ports
#   docker compose down                # stop & remove all
#
# Port range 2222-2321 allows up to 100 simultaneous containers.

services:

  # ── RHEL 8 (AlmaLinux 8) ─────────────────────────────────
  rhel8:
    image: nazdridoy/nazhat-lab:rhel8
    build:
      context: ./RHEL8
    privileged: true
    ports:
      # Replicas claim sequential ports starting at 2222 (2222, 2223, 2224 …)
      # Range of 100 is effectively unlimited for any lab scenario.
      - "127.0.0.1:2222-2321:22"
    restart: unless-stopped
